<style>
  html, body { background: #000; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #fff; }
  .serif { font-family: 'Instrument Serif', serif; }
  .cnserif { font-family: 'Noto Serif SC', 'Instrument Serif', serif; }

  /* ==== Liquid Glass ==== */
  .liquid-glass {
    background: rgba(255, 255, 255, 0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.45) 0%,
      rgba(255, 255, 255, 0.15) 20%,
      rgba(255, 255, 255, 0) 40%,
      rgba(255, 255, 255, 0) 60%,
      rgba(255, 255, 255, 0.15) 80%,
      rgba(255, 255, 255, 0.45) 100%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* Placeholder panels for user-supplied media */
  .media-placeholder {
    background:
      repeating-linear-gradient(135deg,
        rgba(255,255,255,0.035) 0 2px,
        transparent 2px 14px),
      #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.35);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    text-align: center; padding: 2rem;
  }

  html { scroll-behavior: smooth; }
  input::placeholder { color: rgba(255,255,255,0.4); }

  /* Ink-brush flavor for Chinese-painting aesthetic */
  .inkbrush-zh {
    font-family: "Ma Shan Zheng", "Long Cang", "ZCOOL XiaoWei", "Noto Serif SC", serif;
    font-weight: 400;
    letter-spacing: 0.08em;
  }
  .inkbrush-en {
    font-family: "Cormorant Garamond", "Instrument Serif", serif;
    font-style: italic;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .hero-research-field {
    background-image:
      linear-gradient(120deg, rgba(126, 214, 202, 0.18), rgba(126, 214, 202, 0) 36%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.055) 0 1px, transparent 1px 78px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 78px);
    opacity: 0.22;
    mix-blend-mode: screen;
    mask-image: linear-gradient(90deg, rgba(0,0,0,0.9), rgba(0,0,0,0.35) 56%, transparent 82%);
    -webkit-mask-image: linear-gradient(90deg, rgba(0,0,0,0.9), rgba(0,0,0,0.35) 56%, transparent 82%);
  }

  .hero-spline {
    position: absolute;
    left: 6%;
    right: 34%;
    bottom: 18%;
    height: 1px;
    background: linear-gradient(90deg, rgba(126, 214, 202, 0), rgba(126, 214, 202, 0.72), rgba(255,255,255,0.12));
    transform: rotate(-4deg);
    box-shadow: 0 0 18px rgba(126, 214, 202, 0.28);
    opacity: 0.48;
  }

  .academic-pill {
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(8, 10, 16, 0.36);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.08);
  }

  /* Retro macOS terminal block for Contact */
  .terminal {
    background: rgba(255, 255, 255, 0.04);
    color: #e8e6e0;
    padding: 18px 20px;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    line-height: 1.7;
    border-radius: 14px;
    text-align: left;
    min-height: 260px;
    backdrop-filter: blur(12px) saturate(1.3);
    -webkit-backdrop-filter: blur(12px) saturate(1.3);
    box-shadow:
      inset 0 1px 1px rgba(255, 255, 255, 0.1),
      0 20px 60px rgba(0, 0, 0, 0.45);
    position: relative;
    overflow: hidden;
  }
  .terminal::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.35) 0%,
      rgba(255, 255, 255, 0.1) 25%,
      rgba(255, 255, 255, 0) 45%,
      rgba(255, 255, 255, 0) 70%,
      rgba(255, 255, 255, 0.12) 100%
    );
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  .terminal > * { position: relative; z-index: 1; }
  .terminal .ascii-logo {
    font-family: inherit;
    white-space: pre;
  }
  .terminal .t-bar {
    display: flex; gap: 6px; align-items: center; margin-bottom: 16px;
  }
  .terminal .t-bar .d {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid rgba(232,230,224,0.6);
  }
  .terminal .t-bar .t-title {
    margin-left: 12px; font-size: 10px; letter-spacing: 0.12em;
    opacity: 0.6; text-transform: uppercase;
  }
  .terminal .prompt { color: #9fd49f; }
  .terminal .path   { color: #9fbfff; }
  .terminal a {
    color: #e8e6e0; border-bottom: 1px dashed currentColor;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .terminal a:hover { opacity: 0.7; }
  .terminal a.email-hi {
    color: #ffd27a;
    border-bottom: 1px solid rgba(255, 210, 122, 0.7);
    font-weight: 600;
    padding: 1px 6px;
    margin: 0 2px;
    border-radius: 3px;
    background: rgba(255, 210, 122, 0.09);
    box-shadow: inset 0 0 0 1px rgba(255, 210, 122, 0.18), 0 0 14px rgba(255, 210, 122, 0.12);
    letter-spacing: 0.01em;
  }
  .terminal a.email-hi:hover {
    background: rgba(255, 210, 122, 0.16);
    color: #ffe3a8;
    opacity: 1;
  }
  .terminal .cursor-tb {
    display: inline-block; width: 7px; height: 13px;
    background: #e8e6e0; vertical-align: -2px; margin-left: 3px;
    animation: tblink 1s steps(1) infinite;
  }
  .terminal .cmt { color: rgba(232,230,224,0.45); }
  @keyframes tblink { 50% { opacity: 0.2; } }

  /* Flowing silver shimmer on the Education timeline rail */
  .edu-rail-wrap {
    position: absolute;
    left: 0; right: 0;
    top: 58px;
    height: 90px;
    pointer-events: none;
    overflow: visible;
    z-index: 1;
  }
  .edu-rail-wrap svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .edu-rail-path {
    fill: none;
    stroke: rgba(255,255,255,0.22);
    stroke-width: 1.2;
  }
  .edu-rail-glow {
    fill: none;
    stroke: url(#eduGlowGrad);
    stroke-width: 1.8;
    stroke-linecap: round;
    filter: drop-shadow(0 0 7px rgba(255,200,110,0.75));
    stroke-dasharray: 220 3000;
    animation: eduDash 6.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
  }
  @keyframes eduDash {
    0%   { stroke-dashoffset: 3220; opacity: 0; }
    3%   { opacity: 1; }
    97%  { opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }

  /* ============ Eastern Scroll cards (Awards / Pursuits) ============ */
  .scroll-card {
    position: relative;
    border-radius: 10px;
    padding: 22px 22px 20px;
    background:
      /* very faint paper grain */
      radial-gradient(120% 80% at 50% 0%, rgba(255, 220, 160, 0.035) 0%, transparent 55%),
      linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.012) 100%),
      #14101c;
    border: 1px solid rgba(212, 165, 116, 0.13);
    box-shadow:
      inset 0 1px 0 rgba(255, 230, 200, 0.06),
      inset 0 0 0 1px rgba(20, 16, 28, 0.6),
      0 14px 34px rgba(0, 0, 0, 0.34);
    overflow: hidden;
  }
  /* horizontal rod caps top + bottom (scroll roller hint) */
  .scroll-card::before,
  .scroll-card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px;
    height: 2px;
    background: linear-gradient(
      90deg,
      rgba(212, 165, 116, 0) 0%,
      rgba(212, 165, 116, 0.34) 12%,
      rgba(255, 220, 160, 0.52) 50%,
      rgba(212, 165, 116, 0.34) 88%,
      rgba(212, 165, 116, 0) 100%
    );
    box-shadow: 0 0 6px rgba(255, 200, 120, 0.18);
    pointer-events: none;
  }
  .scroll-card::before { top: 10px; }
  .scroll-card::after  { bottom: 10px; }

  .scroll-card-head {
    position: relative;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    column-gap: 16px;
    padding: 4px 0 14px;
    margin-bottom: 14px;
    border-bottom: 1px solid rgba(212, 165, 116, 0.13);
  }
  .scroll-card-eyebrow {
    grid-column: 1;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(255, 220, 160, 0.55);
    margin-bottom: 6px;
  }
  .scroll-card-title {
    grid-column: 1;
    font-family: "Cormorant Garamond", "Instrument Serif", "Noto Serif SC", serif;
    font-weight: 500;
    font-size: 32px;
    letter-spacing: 0.04em;
    color: #f3ead9;
    line-height: 1;
  }
  .inkbrush-zh + * .scroll-card-title,
  body:has(.cnserif) .scroll-card-title { /* no-op fallback */ }
  /* Ink-circle seal artwork (image-based) */
  .scroll-card-seal {
    grid-column: 2;
    grid-row: 1 / span 2;
    align-self: center;
    width: 64px;
    height: 64px;
    object-fit: contain;
    transform: rotate(-3deg) translateY(2px);
    filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.45));
    pointer-events: none;
    user-select: none;
  }
  .scroll-card-seal::before,
  .scroll-card-seal::after { content: none; }

  .scroll-card-body {
    flex: 1 1 auto;
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .scroll-card-body > li + li {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed rgba(212, 165, 116, 0.16);
  }

  .scroll-row {
    display: grid;
    grid-template-columns: 70px 14px 1fr;
    align-items: baseline;
    column-gap: 12px;
  }
  .scroll-row-year {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: rgba(255, 220, 160, 0.7);
    white-space: nowrap;
  }
  .scroll-row-rule {
    height: 1px;
    background: linear-gradient(90deg, rgba(212, 165, 116, 0.45) 0%, rgba(212, 165, 116, 0) 100%);
    align-self: center;
  }
  .scroll-row-main {
    min-width: 0;
  }
  .scroll-row-title {
    color: rgba(255, 245, 230, 0.95);
    font-size: 15px;
    line-height: 1.45;
    letter-spacing: 0.005em;
  }
  .scroll-row-note {
    margin-top: 4px;
    color: rgba(255, 245, 230, 0.45);
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .scroll-row--lang {
    grid-template-columns: 96px 14px 1fr;
  }
  .scroll-row--lang + .scroll-row--lang {
    margin-top: 0 !important;
    padding-top: 0 !important;
    border-top: none !important;
  }

  .scroll-subhead {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255, 220, 160, 0.55);
  }

  /* Hobby chips — small "stamp" tiles */
  .hobby-chip {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px 10px 10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.015) 100%);
    border: 1px solid rgba(212, 165, 116, 0.18);
    border-radius: 8px;
    transition: transform 200ms ease, border-color 200ms ease, background 200ms ease;
  }
  .hobby-chip:hover {
    transform: translateY(-1px);
    border-color: rgba(255, 220, 160, 0.45);
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
  }
  .hobby-glyph {
    flex-shrink: 0;
    width: 32px; height: 32px;
    display: block;
    overflow: hidden;
    border-radius: 3px;
    box-shadow:
      0 0 0 1px rgba(255, 220, 200, 0.28),
      0 7px 16px rgba(0, 0, 0, 0.24);
  }
  .hobby-glyph img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .hobby-label {
    color: rgba(255, 245, 230, 0.92);
    font-size: 14px;
    letter-spacing: 0.02em;
  }

  .publication-masonry-list {
    position: relative;
    width: 100%;
  }
  .publication-masonry-item {
    position: absolute;
    top: 0;
    left: 0;
    will-change: transform, width, height, opacity, filter;
    padding: 6px;
    cursor: pointer;
  }
  .publication-feature-card,
  .publication-small-card {
    position: relative;
    height: 100%;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.10);
    background:
      radial-gradient(120% 100% at 20% 0%, rgba(255,255,255,0.035), transparent 48%),
      rgba(255,255,255,0.022);
    box-shadow: 0 18px 55px rgba(0,0,0,0.24);
    transition: border-color 220ms ease, background 220ms ease;
  }
  .publication-feature-card {
    border-radius: 10px;
    display: flex;
    flex-direction: column;
  }
  .publication-feature-card:hover,
  .publication-small-card:hover {
    border-color: rgba(255,255,255,0.18);
    background:
      radial-gradient(120% 100% at 20% 0%, rgba(255,255,255,0.05), transparent 48%),
      rgba(255,255,255,0.036);
  }
  .publication-feature-thumb {
    flex: 0 0 43%;
    min-height: 190px;
    overflow: hidden;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .publication-feature-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
  }
  .publication-feature-body {
    flex: 1;
    min-height: 0;
    padding: 18px 18px 16px;
    display: flex;
    flex-direction: column;
  }
  .publication-venue-badge {
    display: inline-flex;
    align-items: center;
    min-height: 23px;
    padding: 3px 8px 3px 9px;
    border: 1px solid rgba(255, 221, 154, 0.36);
    border-radius: 4px;
    background:
      linear-gradient(180deg, rgba(255, 234, 185, 0.16), rgba(255, 255, 255, 0.055)),
      rgba(255, 255, 255, 0.035);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.16),
      0 0 0 1px rgba(255, 255, 255, 0.05),
      0 8px 20px rgba(255, 190, 92, 0.08);
    color: rgba(255, 243, 217, 0.88);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.13em;
    text-transform: uppercase;
  }
  .publication-small-card {
    border-radius: 8px;
    padding: 18px;
  }
  @media (min-width: 1000px) {
    .publication-feature-body {
      padding: 20px;
    }
  }
  @media (max-width: 599px) {
    .publication-masonry-item {
      padding: 0 0 14px;
    }
    .publication-feature-thumb {
      min-height: 220px;
    }
    .publication-feature-body {
      padding: 18px;
    }
  }

  .hero-lanyard-shell {
    --lanyard-w: min(42vw, 520px);
    --lanyard-r: clamp(-0.75rem, 3.25vw, 3.75rem);
    position: absolute;
    top: 34px;
    right: var(--lanyard-r);
    z-index: 18;
    width: var(--lanyard-w);
    height: clamp(520px, 72vh, 720px);
    pointer-events: none;
    opacity: 0.94;
  }
  .hero-lanyard-shell .lanyard-wrapper {
    position: relative;
    z-index: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    transform: scale(1);
    transform-origin: center;
  }
  .hero-lanyard-shell canvas {
    pointer-events: auto;
  }
  .hero-nav-glass {
    overflow: visible;
    isolation: isolate;
  }
  .hero-lanyard-mount {
    --lanyard-w: min(42vw, 520px);
    --lanyard-r: clamp(-0.75rem, 3.25vw, 3.75rem);
    --nav-edge-offset: max(24px, calc((100vw - 64rem) / 2));
    position: absolute;
    top: calc(100% - 18px);
    right: calc(var(--lanyard-r) + (var(--lanyard-w) / 2) - 32px - var(--nav-edge-offset));
    z-index: 3;
    width: 64px;
    height: 72px;
    pointer-events: none;
  }
  .hero-lanyard-slot {
    position: absolute;
    top: -2px;
    left: 50%;
    width: 64px;
    height: 32px;
    transform: translateX(-50%);
    z-index: 3;
    background: url('assets/lanyard/nav-eyelet.png?v=smoked-bronze-integrated') center / contain no-repeat;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,0.32));
  }
  .hero-lanyard-slot::after {
    content: '';
    position: absolute;
    left: 13px;
    right: 13px;
    bottom: 6px;
    height: 4px;
    border-radius: 999px;
    background: rgba(7, 5, 12, 0.34);
    box-shadow:
      inset 0 1px 1px rgba(0,0,0,0.42),
      0 1px 0 rgba(255, 221, 168, 0.08);
  }
  .hero-lanyard-slot::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 8px;
    width: 50px;
    height: 18px;
    transform: translateX(-50%);
    border-radius: 999px;
    background:
      radial-gradient(ellipse at center, rgba(12, 9, 18, 0.36) 0%, rgba(12, 9, 18, 0.18) 46%, rgba(0,0,0,0) 76%);
    box-shadow:
      0 -1px 0 rgba(255,255,255,0.05),
      0 5px 10px rgba(0,0,0,0.16);
    z-index: -1;
  }
  .hero-lanyard-ring {
    position: absolute;
    top: 12px;
    left: 50%;
    width: 42px;
    height: 42px;
    transform: translateX(-50%);
    z-index: 1;
    background: url('assets/lanyard/buckle.png?v=antique-gold-hollow') center / contain no-repeat;
    filter: drop-shadow(0 5px 7px rgba(0,0,0,0.42));
  }
  @media (max-width: 900px) {
    .hero-lanyard-shell {
      --lanyard-w: 230px;
      --lanyard-r: -44px;
      top: 64px;
      right: -44px;
      width: 230px;
      height: 360px;
      opacity: 0.5;
      transform: rotate(5deg);
    }
    .hero-lanyard-mount {
      --lanyard-w: 230px;
      --lanyard-r: -44px;
      top: calc(100% - 14px);
      transform: scale(0.78);
      transform-origin: top center;
    }
    .hero-lanyard-shell canvas {
      pointer-events: none;
    }
  }
  @media (max-width: 540px) {
    .hero-lanyard-shell {
      --lanyard-w: 190px;
      --lanyard-r: -52px;
      top: 74px;
      right: -52px;
      width: 190px;
      height: 310px;
      opacity: 0.36;
    }
    .hero-lanyard-mount {
      --lanyard-w: 190px;
      --lanyard-r: -52px;
      top: calc(100% - 12px);
      transform: scale(0.64);
    }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="importmap">
{

function useInViewFallback(ref, options) {
  const [v, setV] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {setV(true);if (options?.once) obs.disconnect();} else
        if (!options?.once) setV(false);
      });
    }, { rootMargin: options?.margin || '0px' });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return v;
}

    if (!video) return;

    // Ping-pong loop: forward → manual reverse → forward → ...
    // We trigger the reverse leg slightly before duration to avoid the browser's auto-end behavior
    // (where a video without `loop` may reset to 0 once it reaches duration).
    const REVERSE_RATE = 1.0;
    const TAIL_MARGIN = 0.15; // start reversing this many seconds before end
    let mode = 'forward'; // 'forward' | 'reverse'
    let lastTs = 0;
    let reversePos = 0;

    const startForward = () => {
      mode = 'forward';
      video.play().catch(() => {});
    };

    const startReverse = (fromTime) => {
      if (mode === 'reverse') return;
      mode = 'reverse';
      reversePos = fromTime;
      lastTs = 0;
      try { video.pause(); } catch (e) {}
      const tick = (ts) => {
        if (mode !== 'reverse') return;
        if (!lastTs) lastTs = ts;
        const dt = (ts - lastTs) / 1000;
        lastTs = ts;
        reversePos -= dt * REVERSE_RATE;
        if (reversePos <= 0) {
          reversePos = 0;
          try { video.currentTime = 0; } catch (e) {}
          startForward();
          return;
        }
        try { video.currentTime = reversePos; } catch (e) {}
        rafRef.current = requestAnimationFrame(tick);
      };
      rafRef.current = requestAnimationFrame(tick);
    };

    const onLoaded = () => { video.style.opacity = '1'; startForward(); };
    const onTimeUpdate = () => {
      if (mode !== 'forward' || !video.duration) return;
      if (video.currentTime >= video.duration - TAIL_MARGIN) {
        startReverse(video.duration - TAIL_MARGIN);
      }
    };

    if (video.readyState >= 2) onLoaded();
    video.addEventListener('loadeddata', onLoaded);
    video.addEventListener('timeupdate', onTimeUpdate);
    return () => {
      video.removeEventListener('loadeddata', onLoaded);
      video.removeEventListener('timeupdate', onTimeUpdate);
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };

/* ============ Masonry layout adapted for publication cards ============ */
const useMedia = (queries, values, defaultValue) => {
  const get = () => values[queries.findIndex((q) => window.matchMedia(q).matches)] ?? defaultValue;
  const [value, setValue] = useState(get);

  useEffect(() => {
    const handler = () => setValue(get());
    const lists = queries.map((q) => window.matchMedia(q));
    lists.forEach((mql) => mql.addEventListener('change', handler));
    return () => lists.forEach((mql) => mql.removeEventListener('change', handler));
  }, [queries.join('|')]);

  return value;
};

const useMeasure = () => {
  const ref = useRef(null);
  const [size, setSize] = useState({ width: 0, height: 0 });

  useLayoutEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(([entry]) => {
      const { width, height } = entry.contentRect;
      setSize({ width, height });
    });
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);

  return [ref, size];
};

const preloadImages = async (urls) => {
  const sources = urls.filter(Boolean);
  await Promise.all(
    sources.map((src) =>
      new Promise((resolve) => {
        const img = new Image();
        img.src = src;
        img.onload = img.onerror = () => resolve();
      })
    )
  );
};

  items,

  ease = 'power3.out',
  duration = 0.6,
  stagger = 0.05,
  animateFrom = 'bottom',
  scaleOnHover = true,
  hoverScale = 0.97,
  blurToFocus = true,
}) {
  const columns = useMedia(
    ['(min-width:1000px)', '(min-width:640px)'],
    [3, 2],
    1
  );
  const [containerRef, { width }] = useMeasure();
  const [imagesReady, setImagesReady] = useState(false);
  const gap = columns === 1 ? 14 : 18;
  const hasMounted = useRef(false);

  useEffect(() => {
    let alive = true;
    setImagesReady(false);
    preloadImages(items.map((i) => i.img)).then(() => {
      if (alive) setImagesReady(true);
    });
    return () => { alive = false; };
  }, [items]);

  const grid = useMemo(() => {
    if (!width) return [];
    const colHeights = new Array(columns).fill(0);
    const columnWidth = (width - gap * (columns - 1)) / columns;

    return items.map((child) => {
      const col = colHeights.indexOf(Math.min(...colHeights));
      const x = (columnWidth + gap) * col;
      const rawHeight = typeof child.height === 'function'
        ? child.height({ columns, width: columnWidth })
        : child.height;
      const y = colHeights[col];
      colHeights[col] += rawHeight + gap;
      return { ...child, x, y, w: columnWidth, h: rawHeight };
    });
  }, [columns, gap, items, width]);

  const containerHeight = useMemo(() => {
    if (!grid.length) return 0;
    return Math.max(...grid.map((item) => item.y + item.h));
  }, [grid]);

  const getInitialPosition = (item) => {
    const containerRect = containerRef.current?.getBoundingClientRect();
    if (!containerRect) return { x: item.x, y: item.y };
    let direction = animateFrom;
    if (animateFrom === 'random') {
      const directions = ['top', 'bottom', 'left', 'right'];
      direction = directions[Math.floor(Math.random() * directions.length)];
    }
    switch (direction) {
      case 'top':
        return { x: item.x, y: -200 };
      case 'bottom':
        return { x: item.x, y: window.innerHeight + 200 };
      case 'left':
        return { x: -200, y: item.y };
      case 'right':
        return { x: window.innerWidth + 200, y: item.y };
      case 'center':
        return {
          x: containerRect.width / 2 - item.w / 2,
          y: containerRect.height / 2 - item.h / 2,
        };
      default:
        return { x: item.x, y: item.y + 100 };
    }
  };

  useLayoutEffect(() => {
    if (!imagesReady || !grid.length) return;
    const gsap = window.gsap;
    grid.forEach((item, index) => {
      const selector = `[data-key="${item.id}"]`;
      const animationProps = { x: item.x, y: item.y, width: item.w, height: item.h };
      if (!gsap) return;
      if (!hasMounted.current) {
        const initialPos = getInitialPosition(item);
        gsap.fromTo(selector, {
          opacity: 0,
          x: initialPos.x,
          y: initialPos.y,
          width: item.w,
          height: item.h,
          ...(blurToFocus && { filter: 'blur(10px)' }),
        }, {
          opacity: 1,
          ...animationProps,
          ...(blurToFocus && { filter: 'blur(0px)' }),
          duration: 0.8,
          ease: 'power3.out',
          delay: index * stagger,
        });
      } else {
        gsap.to(selector, { ...animationProps, duration, ease, overwrite: 'auto' });
      }
    });
    hasMounted.current = true;
  }, [grid, imagesReady, stagger, animateFrom, blurToFocus, duration, ease]);

  const handleMouseEnter = (item) => {
    if (!scaleOnHover || !window.gsap) return;
    window.gsap.to(`[data-key="${item.id}"]`, {
      scale: hoverScale,
      duration: 0.28,
      ease: 'power2.out',
    });
  };

  const handleMouseLeave = (item) => {
    if (!scaleOnHover || !window.gsap) return;
    window.gsap.to(`[data-key="${item.id}"]`, {
      scale: 1,
      duration: 0.28,
      ease: 'power2.out',
    });
  };

  return (
    <div ref={containerRef} className="publication-masonry-list" style={{ height: containerHeight }}>
      {grid.map((item) => (
        <div
          key={item.id}
          data-key={item.id}
          className="publication-masonry-item"
          style={{
            width: item.w,
            height: item.h,
            transform: `translate(${item.x}px, ${item.y}px)`,
            opacity: imagesReady ? 1 : 0,
          }}
          onClick={() => item.url && window.open(item.url, '_blank', 'noopener')}
          onMouseEnter={() => handleMouseEnter(item)}
          onMouseLeave={() => handleMouseLeave(item)}>
          {renderItem(item)}
        </div>
      ))}
    </div>
  );
}

/* Highlight Jincheng's name in author lists */
function highlightAuthor(authors) {
  const parts = authors.split(/(Wang J|J Wang|J\. Wang|Wang, J\.?|Wang Jincheng|Jincheng Wang)/g);
  return parts.map((p, i) => {
    if (/^(Wang J|J Wang|J\. Wang|Wang, J\.?|Wang Jincheng|Jincheng Wang)$/.test(p)) {
      return (
        <span key={i} style={{ color: '#ffd27a', fontWeight: 600, textShadow: '0 0 12px rgba(255,210,122,0.25)' }}>{p}</span>
      );
    }
    return <span key={i}>{p}</span>;
  });
}

/* Procedurally-generated thumbnail tiles for papers */
function PaperThumb({ hue, pattern }) {
  const bg = `linear-gradient(135deg, hsl(${hue}, 45%, 18%) 0%, hsl(${(hue+40)%360}, 55%, 10%) 100%)`;
  const accent = `hsl(${hue}, 70%, 65%)`;
  const soft = `hsl(${hue}, 40%, 55%)`;
  return (
    <div className="w-full h-full relative" style={{ background: bg }}>
      <svg className="absolute inset-0 w-full h-full" viewBox="0 0 160 160" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
          <radialGradient id={`g-${hue}`} cx="30%" cy="30%" r="80%">
            <stop offset="0%" stopColor="white" stopOpacity="0.18" />
            <stop offset="100%" stopColor="white" stopOpacity="0" />
          </radialGradient>
        </defs>
        <rect width="160" height="160" fill={`url(#g-${hue})`} />
        {pattern === 'wave' &&
          Array.from({ length: 7 }).map((_, k) =>
            <path key={k} d={`M 0 ${30+k*18} Q 40 ${20+k*18} 80 ${30+k*18} T 160 ${30+k*18}`} fill="none" stroke={accent} strokeOpacity={0.25+k*0.05} strokeWidth="1" />
          )}
        {pattern === 'lattice' &&
          Array.from({ length: 8 }).map((_, k) =>
            <g key={k}>
              <line x1={k*22} y1="0" x2={k*22+40} y2="160" stroke={accent} strokeOpacity="0.25" strokeWidth="0.8" />
              <line x1={k*22+40} y1="0" x2={k*22} y2="160" stroke={soft} strokeOpacity="0.18" strokeWidth="0.8" />
            </g>
          )}
        {pattern === 'spline' && (
          <>
            <path d="M 0 120 C 40 60, 80 140, 120 60 S 200 100, 240 80" fill="none" stroke={accent} strokeOpacity="0.8" strokeWidth="1.5" />
            <path d="M 0 100 C 40 40, 80 120, 120 40 S 200 80, 240 60" fill="none" stroke={soft} strokeOpacity="0.5" strokeWidth="1" />
            {Array.from({ length: 12 }).map((_, k) =>
              <circle key={k} cx={15+k*12} cy={100 + Math.sin(k*0.9)*28} r="1.8" fill={accent} opacity="0.9" />
            )}
          </>
        )}
        {pattern === 'dots' &&
          Array.from({ length: 60 }).map((_, k) => {
            const x = (k*37) % 160, y = ((k*83) % 160);
            return <circle key={k} cx={x} cy={y} r={0.8 + (k%4)*0.5} fill={k%3===0 ? accent : soft} opacity={0.3 + (k%5)*0.12} />;
          })}
        {pattern === 'grid' &&
          <>
            {Array.from({ length: 9 }).map((_, k) =>
              <line key={`h${k}`} x1="0" y1={k*20} x2="160" y2={k*20} stroke={soft} strokeOpacity="0.18" />
            )}
            {Array.from({ length: 9 }).map((_, k) =>
              <line key={`v${k}`} x1={k*20} y1="0" x2={k*20} y2="160" stroke={soft} strokeOpacity="0.18" />
            )}
            <rect x="40" y="60" width="50" height="40" fill="none" stroke={accent} strokeWidth="1.2" />
            <rect x="70" y="80" width="50" height="40" fill="none" stroke={accent} strokeWidth="1.2" strokeOpacity="0.6" />
          </>
        }
      </svg>
      <div className="absolute inset-0 ring-1 ring-inset ring-white/5" />
    </div>);
}

/* ============ Terminal (typewriter + ASCII + dual clock) ============ */
function useDualClock() {
  const [t, setT] = useState(() => new Date());
  useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const fmt = (tz) => {
    try {
      return new Intl.DateTimeFormat('en-GB', {
        timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
      }).format(t);
    } catch (e) { return '--:--:--'; }
  };
  return { utc: fmt('UTC'), bj: fmt('Asia/Shanghai') };
}

// Flat text script of the whole session. Links are inlined as [label](url)
// and rendered specially in the final pass.
const TERM_SCRIPT = [
  { kind: 'cmd',  text: 'whoami' },
  { kind: 'out',  text: 'jincheng_wang — ucl cs phd candidate' },
  { kind: 'out',  text: 'research: robot learning · planning · physical interaction' },
  { kind: 'out',  text: 'location: London, UK' },
  { kind: 'spacer' },
  { kind: 'cmd',  text: 'cat contact.txt' },
  { kind: 'out',  text: 'email  → [!ucabj46@ucl.ac.uk](mailto:ucabj46@ucl.ac.uk)' },
  { kind: 'out',  text: 'scholar → [profile](https://scholar.google.com/citations?user=fgCXxRkAAAAJ&hl=zh-CN)' },
  { kind: 'spacer' },
  { kind: 'prompt' }, // trailing prompt with cursor
];

const ASCII_LOGO = [
  '   ___     ___      __',
  '  |_  |   |_  |    / /',
  '    | |     | | /\\/ /',
  '    | |  _  | |/    /',
  '  __| | | |_| /\\/ /',
  ' |_ _/   \\__/_/  \\/',
];

// Parse markdown-ish links into tokens. A '!' prefix inside the label marks
// it as a highlighted link (e.g. [!email](mailto:...)).
function parseLinks(text) {
  const tokens = [];
  const re = /\[([^\]]+)\]\(([^)]+)\)/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) tokens.push({ t: 'text', v: text.slice(last, m.index) });
    let label = m[1];
    const hi = label.startsWith('!');
    if (hi) label = label.slice(1);
    tokens.push({ t: 'link', v: label, href: m[2], hi });
    last = m.index + m[0].length;
  }
  if (last < text.length) tokens.push({ t: 'text', v: text.slice(last) });
  return tokens;
}

// Compute the plain-length of a line (for typewriter char counting)
function plainLen(line) {
  if (line.kind === 'cmd')    return ('$ ' + line.text).length + 'jincheng@ash:~'.length;
  if (line.kind === 'out')    return line.text.replace(/\[!?([^\]]+)\]\([^)]+\)/g, '$1').length + 2;
  if (line.kind === 'ascii')  return ASCII_LOGO.reduce((a, l) => a + l.length, 0);
  if (line.kind === 'spacer') return 1;
  if (line.kind === 'prompt') return 'jincheng@ash:~$ '.length;
  return 0;
}

function Terminal({ inView }) {
  const { utc, bj } = useDualClock();
  const [progress, setProgress] = useState(0); // total chars revealed across all lines
  const [done, setDone] = useState(false);

  // Total characters in whole script (for knowing when done)
  const totalChars = useMemo(
    () => TERM_SCRIPT.reduce((a, l) => a + plainLen(l), 0),
    []
  );

  useEffect(() => {
    if (!inView) return;
    let p = 0;
    let timer;
    const tick = () => {
      p += 2;
      if (p >= totalChars) {
        setProgress(totalChars);
        setDone(true);
        return;
      }
      setProgress(p);
      timer = setTimeout(tick, 18);
    };
    timer = setTimeout(tick, 300);
    return () => { if (timer) clearTimeout(timer); };
  }, [inView, totalChars]);

  // Render each line, cutting by remaining characters
  let remaining = progress;
  const renderedLines = [];
  for (let idx = 0; idx < TERM_SCRIPT.length; idx++) {
    const line = TERM_SCRIPT[idx];
    const len = plainLen(line);
    if (remaining <= 0 && !done) break;
    const take = Math.min(len, remaining);
    remaining -= len;
    renderedLines.push({ line, take, full: take >= len, idx });
  }

  return (
    <MotionDiv
      className="terminal"
      initial={{ opacity: 0, x: -20 }}
      animate={inView ? { opacity: 1, x: 0 } : {}}
      transition={{ duration: 0.8 }}>
      <div className="t-bar">
        <span className="d" /><span className="d" /><span className="d" />
        <span className="t-title">— jincheng@ash —</span>
        <span className="ml-auto flex items-center gap-3 text-[12px] font-mono tracking-wider" style={{ color: 'rgba(232,230,224,0.7)' }}>
          <span><span style={{ color: '#9fd49f' }}>UTC</span> {utc}</span>
          <span><span style={{ color: '#ffcc99' }}>BJ</span> {bj}</span>
        </span>
      </div>
      {renderedLines.map(({ line, take, full, idx }) => {
        if (line.kind === 'cmd') {
          const prefix = 'jincheng@ash:~$ ';
          const shown = sliceLine(prefix + line.text, take);
          // Split stylized parts
          const userLen = 'jincheng@ash'.length;
          const pathLen = userLen + 1; // + ':'
          const full2 = shown.length;
          return (
            <div key={idx}>
              <span className="prompt">{shown.slice(0, Math.min(full2, userLen))}</span>
              {full2 > userLen && <span>{shown.slice(userLen, Math.min(full2, pathLen))}</span>}
              {full2 > pathLen && <span className="path">{shown.slice(pathLen, Math.min(full2, pathLen + 1))}</span>}
              {full2 > pathLen + 1 && <span>{shown.slice(pathLen + 1)}</span>}
            </div>);

        }
        if (line.kind === 'out') {
          // Reveal text, preserving links when reached
          const tokens = parseLinks(line.text);
          const plain = line.text.replace(/\[!?([^\]]+)\]\([^)]+\)/g, '$1');
          const showChars = Math.max(0, take - 2); // "  " indent counts
          let acc = 0;
          const parts = [];
          for (const tok of tokens) {
            const vlen = tok.v.length;
            if (acc >= showChars) break;
            const part = tok.v.slice(0, Math.max(0, showChars - acc));
            if (tok.t === 'link' && part.length === vlen) {
              parts.push(
                <a key={acc} href={tok.href} target="_blank" rel="noopener" className={tok.hi ? 'email-hi' : ''}>{part}</a>
              );
            } else {
              parts.push(<span key={acc}>{part}</span>);
            }
            acc += part.length;
            if (part.length < vlen) break;
          }
          return <div key={idx}>&nbsp;&nbsp;{parts}</div>;
        }
        if (line.kind === 'ascii') {
          if (take <= 0 && !full) return null;
          return (
            <pre key={idx} className="ascii-logo" style={{ margin: '6px 0 0 0', lineHeight: 1.1, fontSize: '11px', color: 'rgba(159, 212, 159, 0.85)' }}>
              {ASCII_LOGO.join('\n')}
            </pre>);

        }
        if (line.kind === 'spacer') {
          return <div key={idx} style={{ height: '8px' }} />;
        }
        if (line.kind === 'prompt') {
          return (
            <div key={idx}>
              <span className="prompt">jincheng@ash</span>:<span className="path">~</span>$ {done && <span className="cursor-tb" />}
            </div>);

        }
        return null;
      })}
      {!done && <span className="cursor-tb" style={{ marginLeft: 2 }} />}
    </MotionDiv>);

}

function sliceLine(str, n) {
  return str.slice(0, Math.max(0, n));
}

      const y = window.scrollY || window.pageYOffset;

      raf = 0;

    window.addEventListener('scroll', onScroll, { passive: true });

          ))}
        </div>
      </div>
    </div>
  );
}

/* ============ App ============ */
function App() {
  const [lang, setLang] = useState(() => {
    try {return localStorage.getItem('jcw_lang') || 'en';} catch {return 'en';}
  });
  useEffect(() => {
    try {localStorage.setItem('jcw_lang', lang);} catch {}
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  }, [lang]);

  return (
    <LangCtx.Provider value={{ lang, setLang }}>
      <main style={{ background: '#0d0a14' }}>
        <StickyNav />
        <Hero />
        <AboutSection />
        <ExperienceSection />
        <WritingSection />
        <AwardsSection />
        <ContactSection />
        <footer style={{ background: '#08060e' }} className=" py-10 px-6 border-t border-white/5">
          <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4 text-xs">
            <div className="flex items-center gap-2 text-white/60">
              <GlobeIcon size={16} />
              <span className="font-medium">{lang === 'zh' ? '王锦程' : 'Jincheng Wang'}</span>
            </div>
            <div className="text-white/30 tracking-widest uppercase font-mono">
              © 2026
            </div>
          </div>
        </footer>
      </main>
    </LangCtx.Provider>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
